#@ load("@ytt:data", "data")
#@yaml/text-templated-strings
jobs:
- name: manually-release
  serial: true
  serial_groups:
    - bump
  plan:
  - in_parallel:
    - get: ruby-release
    - get: semver
      params:
        bump: minor
    - get: bosh-shared-ci
  - task: finalize
    file: bosh-shared-ci/tasks/release/create-final-release.yml
    input_mapping:
      release_repo: ruby-release
      version: semver
    params:
      GIT_USER_NAME: CI Bot
      GIT_USER_EMAIL: bots@cloudfoundry.org
      PRIVATE_YML: |
        ---
        blobstore:
          provider: gcs
          options:
            credentials_source: static
            json_key: '((gcp_json_key))'
  - in_parallel:
    - put: semver
      params:
        file: semver/version
    - put: ruby-release
      params:
        rebase: true
        repository: release_repo
        tag: release_metadata/tag-name

#@ for ruby in data.values.rubies:
- name: test-(@= ruby.version @)
  serial: true
  plan:
  - in_parallel:
    - get: ruby-release
      trigger: true
    - get: stemcell
      resource: (@= ruby.stemcell @)
      trigger: true
    - get: docker-cpi-image
  - task: test
    file: ruby-release/ci/tasks/test.yml
    image: docker-cpi-image
    privileged: true
    timeout: 2h
    params:
      RUBY_VERSION: "(@= ruby.version @)"
      STEMCELL: "(@= ruby.stemcell @)"

- name: bump-(@= ruby.version @)
  serial: true
  serial_groups:
    - bump
  plan:
  - in_parallel:
    - get: ruby
      resource: ruby-(@= ruby.version @)
      trigger: true
    - get: rubygems
      resource: rubygems-(@= ruby.rubygems @)
      trigger: true
    - get: libyaml
      resource: yaml-(@= ruby.libyaml @)
      trigger: true
    - get: ruby-release
    - get: stemcell
      resource: (@= ruby.stemcell @)
    - get: bosh-src
    - get: semver
      params:
        bump: minor
    - get: bosh-shared-ci
    - get: docker-cpi-image
  - task: bump
    file: ruby-release/ci/tasks/bump.yml
    image: docker-cpi-image
    params:
      PRIVATE_YML: |
        ---
        blobstore:
          provider: gcs
          options:
            credentials_source: static
            json_key: '((gcp_json_key))'
      RUBY_VERSION: "(@= ruby.version @)"
      RUBYGEMS_VERSION: "(@= ruby.rubygems @)"
      LIBYAML_VERSION: "(@= ruby.libyaml @)"
  - task: test-bumped
    file: ruby-release/ci/tasks/test.yml
    image: docker-cpi-image
    privileged: true
    params:
      RUBY_VERSION: "(@= ruby.version @)"
      STEMCELL: "(@= ruby.stemcell @)"
  - task: finalize
    file: bosh-shared-ci/tasks/release/create-final-release.yml
    input_mapping:
      release_repo: ruby-release
      version: semver
    params:
      GIT_USER_NAME: CI Bot
      GIT_USER_EMAIL: bots@cloudfoundry.org
      PRIVATE_YML: |
        ---
        blobstore:
          provider: gcs
          options:
            credentials_source: static
            json_key: '((gcp_json_key))'
  - in_parallel:
    - put: semver
      params:
        file: semver/version
    - put: ruby-release
      params:
        rebase: true
        repository: release_repo
        tag: release_metadata/tag-name
#@ end
- name: build-docker-image
  plan:
  - in_parallel:
    - get: ubuntu-registry-image
    - get: ruby-release
      trigger: true
    - get: bosh-cli-github-release
      trigger: true
      params:
        globs:
          - "no-files-needed"
  - load_var: bosh_cli_version
    file: bosh-cli-github-release/version
  - task: build-oci-image
    privileged: true
    config:
      platform: linux
      image_resource:
        type: registry-image
        source:
          repository: concourse/oci-build-task
      inputs:
        - name: ruby-release
      outputs:
        - name: image
      params:
        CONTEXT: ruby-release
        DOCKERFILE: ruby-release/ci/docker/Dockerfile
        BUILD_ARG_BOSH_CLI_VERSION: "((.:bosh_cli_version))"
      run:
        path: build
  - put: ruby-release-image
    params:
      image: image/image.tar
    get_params:
      skip_download: true

#@yaml/text-templated-strings
resources:
- name: bosh-shared-ci
  type: git
  source:
    uri: git@github.com:cloudfoundry/bosh-shared-ci.git
    private_key: ((github_deploy_key_bosh-shared-ci.private_key))

- name: bosh-src
  type: git
  source:
    uri: https://github.com/cloudfoundry/bosh.git

- name: ruby-release
  type: git
  source:
    uri: git@github.com:cloudfoundry/bosh-package-ruby-release.git
    branch: main
    private_key: ((github_deploy_key_ruby-release.private_key))

- name: ubuntu-noble
  type: bosh-io-stemcell
  source:
    name: bosh-warden-boshlite-ubuntu-noble

- name: semver
  type: semver
  source:
    initial_version: "0.187.0"
    driver: git
    uri: git@github.com:cloudfoundry/bosh-package-ruby-release.git
    branch: release-semver
    file: VERSION
    private_key: ((github_deploy_key_ruby-release.private_key))

#@ for rubygems in data.values.rubygems:
- name: rubygems-(@= rubygems.version @)
  type: dynamic-metalink
  source:
    version: "(@= rubygems.version @).x"
    version_check: |
     git ls-remote --tags https://github.com/rubygems/rubygems.git \
       | cut -f2 \
       | grep -v '\^{}' \
       | grep -E '^refs/tags/.+$' \
       | sed  -E 's/^refs\/tags\/(.+)$/\1/'  \
       | sed  's/^v//' \
       | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$'
    metalink_get: |
      export name="rubygems-${version}.tgz"
      export url="https://rubygems.org/rubygems/rubygems-${version}.tgz"
      export size=$( curl --silent --head "$url" | grep Content-Length | awk '{ print $2 }' | tr -cd '[:digit:]' )
      jq -n '
      {
       "files": [
        {
         "name": env.name,
         "urls": [ { "url": env.url } ],
         "size": env.size | tonumber
        }
       ]
      }'
#@ end

#@ for libyaml in data.values.libyamls:
- name: yaml-(@= libyaml.version @)
  type: dynamic-metalink
  source:
    version: "(@= libyaml.version @).x"
    version_check: |
     git ls-remote --tags https://github.com/yaml/libyaml.git \
       | cut  -f2 \
       | grep -v '\^{}' \
       | grep -E '^refs/tags/.+$' \
       | sed  -E 's/^refs\/tags\/(.+)$/\1/'  \
       | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$'
    metalink_get: |
      export name="yaml-${version}.tar.gz"
      export url="https://github.com/yaml/libyaml/releases/download/${version}/yaml-${version}.tar.gz"
      export size=$( curl --silent --head --location "$url" | grep -i Content-Length | tail -1 | awk '{ print $2 }' | tr -cd '[:digit:]' )
      jq -n '
      {
       "files": [
        {
         "name": env.name,
         "urls": [ { "url": env.url } ],
         "size": env.size | tonumber
        }
       ]
      }'
#@ end

#@ for ruby in data.values.rubies:
- name: ruby-(@= ruby.version @)
  type: dynamic-metalink
  source:
    version: "(@= ruby.version @).x"
    version_check: |
      curl --silent --location http://cache.ruby-lang.org/pub/ruby/index.txt \
        | tail -n +2 \
        | awk '{ print $2 }' \
        | grep -E '/ruby-[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz$' \
        | sed -E 's|.*/ruby-([0-9]+\.[0-9]+\.[0-9]+)\.tar\.gz$|\1|'
    metalink_get: |
      index="$(curl --silent --location http://cache.ruby-lang.org/pub/ruby/index.txt)"
      export url="$(echo "$index" | awk -v v="${version}" '$2 ~ ("/ruby-" v "\\.tar\\.gz$") { print $2 }')"
      export sha256="$(echo "$index" | awk -v v="${version}" '$2 ~ ("/ruby-" v "\\.tar\\.gz$") { print $4 }')"
      export name="ruby-${version}.tar.gz"
      export size="$(curl --silent --head "$url" | grep -i Content-Length | awk '{ print $2 }' | tr -cd '[:digit:]')"
      jq -n '
      {
       "files": [
        {
         "name": env.name,
         "urls": [ { "url": env.url } ],
         "hashes": [{ "type": "sha-256", "hash": env.sha256 }],
         "size": env.size | tonumber
        }
       ]
      }'
#@ end

- name: ubuntu-registry-image
  type: registry-image
  source:
    repository: ubuntu
    username: ((bosh-dockerhub.username))
    password: ((bosh-dockerhub.password))

- name: ruby-release-image
  type: registry-image
  source:
    repository: bosh/ruby-release
    tag: latest
    username: ((bosh-dockerhub.username))
    password: ((bosh-dockerhub.password))

- name: bosh-cli-github-release
  type: github-release
  source:
    access_token: ((github_public_repo_token))
    owner: cloudfoundry
    repository: bosh-cli

- name: docker-cpi-image
  type: docker-image
  source:
    repository: ghcr.io/cloudfoundry/bosh/docker-cpi
    username: ((github_read_write_packages.username))
    password: ((github_read_write_packages.password))

resource_types:
- name: dynamic-metalink
  type: registry-image
  source:
    repository: dpb587/dynamic-metalink-resource

- name: semver
  type: registry-image
  source:
    repository: concourse/semver-resource
    tag: 1.6 #! TODO remove
